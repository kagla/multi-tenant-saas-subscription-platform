[program:saas-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/saas-platform/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/saas-platform/storage/logs/worker.log
stopwaitsecs=3600

[program:saas-scheduler]
process_name=%(program_name)s
command=/bin/sh -c "while true; do php /var/www/saas-platform/artisan schedule:run --verbose --no-interaction >> /dev/null 2>&1; sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/saas-platform/storage/logs/scheduler.log
